                    O novo polo de inovação verde. Impulsionado por políticas públicas estaduais consistentes, expansão de <Tooltip term="CEBIO" text="Centro de Excelência em Bioinsumos: articula pesquisa, ensino e extensão agrícola, descentralizando polos estratégicos pelo interior de Goiás." /> e a força sucroenergética do Sudoeste goiano.
                  </p>
                  <div className="flex flex-wrap gap-2">
                    <span className="px-2 py-1 bg-slate-100 text-xs font-medium rounded text-slate-600"><Tooltip term="Bioinsumos On Farm" text="Produção biológica realizada dentro da própria propriedade rural. É o setor que mais cresce e que mais carece de boas práticas de laboratório." /></span>

                    <span className="px-2 py-1 bg-slate-100 text-xs font-medium rounded text-slate-600">Melhoramento Genético</span>
                  </div>
                </div>
              </div>

                      key={region.id}
                      onClick={() => setActiveRegion(region)}

                          : 'border-transparent bg-white shadow-sm hover:border-slate-300'
                      }`}

                      <div className="flex items-center gap-3">
                        <div className={`p-2 rounded-lg ${region.color}`}>
                          {region.icon}
                        </div>
                        <div>
                          <h4 className="font-bold text-slate-800">{region.name}</h4>
                          <p className="text-xs text-slate-500 font-medium">{region.tier}</p>
                        </div>
                      </div>
                      <SvgIcon name="ChevronRight" className={`w-5 h-5 ${activeRegion.id === region.id ? 'text-blue-500' : 'text-slate-300 group-hover:text-slate-400'}`} />
                    </button>

                      <SvgIcon name="Globe" className="w-4 h-4" /> Rede de Extensão (Apoio)

                    <p className="text-xs text-slate-500 leading-relaxed">

                                />

                              <span className="text-lg font-bold text-slate-700">{activeRegion.aderencia}%</span>
                            </div>
                            <div className="text-xs text-slate-600 leading-relaxed border-l-2 border-slate-200 pl-3">
                              <strong className="block text-slate-700 mb-0.5">Por que {activeRegion.aderencia}%?</strong>

                          </div>
                        </div>

                            <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">{ind.label}</p>
                            <p className="text-xl md:text-2xl font-black text-slate-800">{ind.value}</p>
                          </div>

                      </div>

                        <h3 className="font-bold text-slate-800 text-lg mb-2 flex items-center gap-2">
                          <SvgIcon name="Briefcase" className="w-5 h-5 text-blue-500" /> Inteligência de Dados & Contratação
                        </h3>
                        <p className="text-sm text-slate-600 mb-4">
                          Cruzamos estimativas demográficas locais com o radar de investimentos industriais para validar a sustentabilidade econômica a longo prazo de uma turma.
                        </p>

                                  <Tooltip term="Público Elegível (IBGE)" text="Faixa etária de 15 a 29 anos, considerada o público-alvo prioritário para ingressar em cursos de formação técnica de nível médio." />

                                <p className="text-sm text-slate-700 font-medium mt-0.5">{activeRegion.demographics}</p>
                              </div>
                            </div>
                            <div className="flex items-start gap-3">
                              <div className="bg-emerald-100 p-2 rounded-lg mt-0.5"><SvgIcon name="CircleDollarSign" className="w-4 h-4 text-emerald-600" /></div>

                                <p className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">

                                <p className="text-sm text-slate-700 font-medium mt-0.5">{activeRegion.investments}</p>
                              </div>
                            </div>
                          </div>
                          <div className="space-y-4">
                            <div className="flex items-start gap-3">

                              <div>
                                <p className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                                  <Tooltip term="Mapa do Trabalho SENAI" text="Projeção do Observatório Nacional da Indústria sobre a necessidade de formação técnica em áreas correlatas na região." />
                                </p>
                                <p className="text-sm text-slate-700 font-medium mt-0.5">{activeRegion.mapaTrabalho}</p>
                              </div>
                            </div>
                            <div className="flex items-start gap-3">
                              <div className="bg-indigo-100 p-2 rounded-lg mt-0.5"><SvgIcon name="Building2" className="w-4 h-4 text-indigo-600" /></div>
                              <div>
                                <p className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                                  <Tooltip term="Segmentos Contratantes" text="Principais atividades econômicas (CNAEs) da região que irão absorver os técnicos formados." />

                                <div className="flex flex-wrap gap-1.5 mt-1.5">

                                      {seg}
                                    </span>
                                  ))}
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>

                        <h3 className="font-bold text-slate-800 text-lg mb-3 flex items-center gap-2">

                        <ul className="space-y-3 bg-white border border-slate-100 rounded-xl p-4">
                          {activeRegion.highlights.map((high, i) => (
                            <li key={i} className="flex items-start gap-3 text-slate-700 text-sm md:text-base">
                              <SvgIcon name="Award" className={`w-5 h-5 flex-shrink-0 mt-0.5 ${activeRegion.textColor}`} />
                              <span>{high}</span>
                            </li>
                          ))}

                      </div>

                      <div className="bg-slate-900 rounded-xl p-5 md:p-6 text-white shadow-inner mb-6">

                          <SvgIcon name="BookOpen" className="w-5 h-5 text-blue-400" /> Proposta Curricular SENAI (1.200h)

                        <p className="text-slate-300 text-sm md:text-base leading-relaxed">
                          <span className="font-bold text-white uppercase tracking-wider text-xs block mb-1">Ajuste de Foco Regional:</span>

                        </p>
                      </div>

                          <SvgIcon name="Lightbulb" className="w-5 h-5" /> Insight Comercial Estratégico
                        </h3>
                        <p className="text-slate-800 text-sm md:text-base leading-relaxed font-medium">

                <p className="text-slate-300 max-w-4xl text-sm md:text-base">
                  A abertura de novas formações técnicas exige um planejamento cadenciado. Em vez de lançar turmas simultâneas em todo o estado, 
                  recomendamos uma estratégia de expansão em "ondas" (fases). Isso mitiga riscos financeiros iniciais e permite validar a aderência do currículo primeiro nos mercados mais urgentes, financiando a expansão posterior.
                </p>
              </div>
              
              <div className="p-6 md:p-10">
                <div className="relative border-l-2 border-slate-200 ml-3 md:ml-6 space-y-10 pb-4">
                  
                  <div className="relative pl-8 md:pl-10">
                    <div className="absolute -left-3 md:-left-[13px] top-0 bg-blue-600 w-6 h-6 md:w-7 md:h-7 rounded-full border-4 border-white shadow-sm flex items-center justify-center">
                      <span className="text-white text-[10px] font-bold">1</span>
                    </div>
                    <h3 className="font-extrabold text-xl text-slate-800 mb-2">Fase 1: A Turma Piloto Segura (Curto Prazo)</h3>
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                      <p className="text-slate-700 mb-2">
                        <strong className="text-slate-900">Onde:</strong> Unidade de Anápolis.
                      </p>
                      <p className="text-slate-600 text-sm md:text-base leading-relaxed">
                        <strong className="text-slate-900 block mb-1">Por que iniciar aqui?</strong> 
                        É o ativo mercadológico mais maduro do estado. A formação terá absorção quase imediata pelo robusto parque industrial do DAIA. O currículo pode ser validado rapidamente com foco em processos regulados, controle de qualidade e rigorosas normas de biossegurança exigidas pela Anvisa.
                      </p>
                    </div>
                  </div>
                  
                  <div className="relative pl-8 md:pl-10">
                    <div className="absolute -left-3 md:-left-[13px] top-0 bg-emerald-500 w-6 h-6 md:w-7 md:h-7 rounded-full border-4 border-white shadow-sm flex items-center justify-center">
                      <span className="text-white text-[10px] font-bold">2</span>
                    </div>
                    <h3 className="font-extrabold text-xl text-slate-800 mb-2">Fase 2: A Fronteira Agro (Médio Prazo)</h3>
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                      <p className="text-slate-700 mb-2">
                        <strong className="text-slate-900">Onde:</strong> Unidade de Rio Verde.
                      </p>
                      <p className="text-slate-600 text-sm md:text-base leading-relaxed">
                        <strong className="text-slate-900 block mb-1">Por que iniciar aqui?</strong> 
                        Posiciona o SENAI como protagonista no centro da revolução da bioeconomia nacional. Dialoga diretamente com o Programa Estadual de Bioinsumos e atende à urgência dos produtores rurais na transição para defensivos biológicos e biometano.
                      </p>
                    </div>
                  </div>

                  <div className="relative pl-8 md:pl-10">
                    <div className="absolute -left-3 md:-left-[13px] top-0 bg-indigo-500 w-6 h-6 md:w-7 md:h-7 rounded-full border-4 border-white shadow-sm flex items-center justify-center">
                      <span className="text-white text-[10px] font-bold">3</span>
                    </div>
                    <h3 className="font-extrabold text-xl text-slate-800 mb-2">Fase 3: Expansão Especializada</h3>
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                      <p className="text-slate-700 mb-2">
                        <strong className="text-slate-900">Onde:</strong> Eixo Goiânia/Aparecida e Polos de Interiorização (Jataí/Catalão).
                      </p>
                      <p className="text-slate-600 text-sm md:text-base leading-relaxed">
                        <strong className="text-slate-900 block mb-1">Por que iniciar aqui?</strong> 
                        Após consolidar e ajustar a matriz curricular nas Fases 1 e 2, o SENAI avança para capturar a demanda de pesquisa metropolitana (Ceti-Saúde) e começa a faturar com formações corporativas (<Tooltip term="FICs" text="Cursos de Formação Inicial e Continuada. Trilhas curtas e modulares ideais para requalificar equipes que já atuam no campo sem afastá-las da rotina." />) customizadas diretamente dentro das biofábricas no interior.
                      </p>
                    </div>
                  </div>

                </div>
              </div>
            </div>

          </main>

          <footer className="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 text-center">
            <div className="max-w-6xl mx-auto px-4">
              <p className="mb-2 font-semibold text-slate-300">Inteligência Estratégica para o Desenvolvimento Profissional</p>
              <p className="text-sm">Os dados apresentados são baseados em projeções do Novo Caged, IBGE, Codego e Mapa do Trabalho Industrial.</p>
              <p className="text-xs mt-4 opacity-50">Painel Interativo Otimizado para Apresentações Executivas</p>
            </div>
          </footer>
        </div>
      );
    }

    // Inicialização do React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BiotecDashboard />);
  </script>
